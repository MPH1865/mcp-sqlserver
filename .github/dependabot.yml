version: 2
updates:
  # npm dependencies (runtime + dev)
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    labels:
      - dependencies
    groups:
      # Batch low-risk dev/type updates into a single PR.
      dev-dependencies:
        dependency-type: development

  # GitHub Actions used by the workflows above
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    labels:
      - dependencies
      - github-actions

  # Docker base image (node:22-slim)
  - package-ecosystem: docker
    directory: "/"
    schedule:
      interval: weekly
    labels:
      - dependencies
      - docker
