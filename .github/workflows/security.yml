name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly re-scan so newly disclosed advisories surface even without commits.
    - cron: '0 6 * * 1'

permissions:
  contents: read

jobs:
  npm-audit:
    name: npm audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Hard gate: no high/critical advisories in *runtime* dependencies.
      # These are the only deps shipped in the Docker image.
      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high

      # Informational: full tree (incl. dev/build toolchain). Does not gate the
      # build, but the report is visible in the job log.
      - name: Audit full dependency tree (informational)
        run: npm audit --audit-level=moderate || true

  dependency-review:
    name: Dependency review
    runs-on: ubuntu-latest
    # Only runs on PRs: flags dependencies introduced/upgraded by the PR.
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - name: Dependency review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
